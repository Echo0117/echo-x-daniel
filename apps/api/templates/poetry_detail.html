{% extends 'base.html' %}
{% block content %}
<div class="poem-page">
  <div class="letter-wrap">
    <div class="paper {{ 'mine' if kind=='mine' else 'found' }}">
      <div class="inner">
        <h1 class="ltitle">{{ title }}</h1>
        <p class="lmeta">Author: {{ author }} · Date: {{ date }}</p>
        <div class="md serif">
          {{ body_html | safe }}
        </div>
        <div class="btns">
          <a class="pbtn" href="/poetry?kind={{ kind }}">← Back</a>
          <a class="pbtn" href="/">🏠 Home</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
