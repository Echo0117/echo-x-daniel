<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Our Blog — Echo 💜 Daniel</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-violet-50 to-pink-50 p-6">
  <div class="max-w-4xl mx-auto">
    <div class="flex items-baseline gap-4">
      <h1 class="text-3xl font-semibold text-gray-800">Our Blog</h1>
      <a class="text-sm text-violet-700 hover:underline ml-auto" href="{{ request.url_for('blog_new') }}">New post →</a>
    </div>

    <div class="mt-6 grid gap-4">
      {% for p in posts %}
        <a class="block bg-white/80 backdrop-blur rounded-2xl shadow p-5 hover:shadow-lg transition" href="{{ request.url_for('blog_view', slug=p.slug) }}">
          <div class="text-xs text-gray-500">{{ p.created_at }}</div>
          <div class="mt-1 text-xl font-semibold text-gray-800">{{ p.title }}</div>
          {% if p.tags %}<div class="text-sm text-gray-500 mt-1"># {{ p.tags }}</div>{% endif %}
          {% if p.cover_url %}<img src="{{ p.cover_url }}" class="mt-3 rounded-xl border" alt="cover">{% endif %}
          <p class="mt-3 text-gray-700 line-clamp-3">{{ p.body }}</p>
        </a>
      {% else %}
        <div class="text-sm text-gray-500">No posts yet. Write one ✨</div>
      {% endfor %}
    </div>
  </div>
</body>
</html>
