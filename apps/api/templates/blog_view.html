<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ post.title }} — Echo 💜 Daniel</title>
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-pink-50 to-violet-50 p-6">
  <div class="max-w-3xl mx-auto bg-white/80 backdrop-blur rounded-2xl shadow-xl p-6 md:p-8">
    <div class="flex items-baseline gap-4">
      <a class="text-sm text-violet-700 hover:underline" href="{{ request.url_for('blog_index') }}">← All posts</a>
      <div class="ml-auto text-xs text-gray-500">{{ post.created_at }}</div>
    </div>

    <h1 class="mt-2 text-3xl font-semibold text-gray-900">{{ post.title }}</h1>
    {% if post.tags %}<div class="mt-1 text-sm text-gray-500"># {{ post.tags }}</div>{% endif %}
    {% if post.cover_url %}<img src="{{ post.cover_url }}" alt="cover" class="mt-4 rounded-xl border">{% endif %}
    <article class="prose max-w-none mt-6">
      {{ body_html | safe }}
    </article>
  </div>
</body>
</html>
